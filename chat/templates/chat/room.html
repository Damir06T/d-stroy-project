<!DOCTYPE html>
<html data-bs-theme="{{ request.session.user_theme|default:'light' }}"> 
<head>
    <title>Чат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: var(--bs-font-sans-serif);
            display: flex; flex-direction: column; 
            height: 100vh; 
            background-color: var(--bs-body-bg); 
            color: var(--bs-body-color);
            overflow: hidden;
        }
        
        /* ШАПКА */
        #chat-header { 
            flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; 
            background-color: var(--bs-tertiary-bg); 
            border-bottom: 1px solid var(--bs-border-color);
        }
        
        .chat-info { display: flex; flex-direction: column; }
        .chat-name { font-weight: bold; font-size: 15px; }
        .chat-status { font-size: 11px; color: var(--bs-secondary-color); transition: color 0.3s; }
        
        .status-online { color: #28a745; font-weight: bold; }
        .status-offline { color: var(--bs-secondary-color); }

        /* ЛОГ СООБЩЕНИЙ */
        #chat-log { 
            flex-grow: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 5px; /* Расстояние между сообщениями */
        }
        
        /* ПУЗЫРЬКИ */
        .message-container { display: flex; flex-direction: column; max-width: 80%; }
        .message-container.sent { align-self: flex-end; align-items: flex-end; }
        .message-container.received { align-self: flex-start; align-items: flex-start; }

        .message-bubble { 
            padding: 8px 12px; 
            border-radius: 16px; /* Более округлые пузырьки */
            font-size: 14px; 
            word-wrap: break-word;
            position: relative;
            line-height: 1.4;
        }
        
        /* Цвета */
        .message-container.sent .message-bubble { 
            background-color: #007bff; 
            color: white; 
            border-bottom-right-radius: 4px;
        }
        .message-container.received .message-bubble { 
            background-color: var(--bs-secondary-bg); 
            color: var(--bs-body-color); 
            border: 1px solid var(--bs-border-color);
            border-bottom-left-radius: 4px;
        }

        /* Время внутри пузырька */
        .msg-time { 
            font-size: 9px; 
            opacity: 0.7; 
            text-align: right; 
            margin-top: 2px; 
            margin-left: 10px; /* Отступ от текста */
            float: right; /* Время справа */
            line-height: 1.5;
        }
        
        /* Цвет времени для своих сообщений (белый) */
        .message-container.sent .msg-time { color: rgba(255,255,255,0.9); }

        /* ВВОД */
        #input-area { 
            flex-shrink: 0;
            display: flex; padding: 10px; 
            border-top: 1px solid var(--bs-border-color); 
            background-color: var(--bs-body-bg); 
        }
        #chat-message-input { flex-grow: 1; margin-right: 10px; border-radius: 20px; padding-left: 15px; }
        #chat-message-submit { border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0; }
        
        #typing-indicator { height: 20px; font-size: 11px; color: var(--bs-primary); padding-left: 15px; font-style: italic; flex-shrink: 0;}
    </style>
</head>
<body>
    <div id="chat-header">
        <div class="chat-info">
            <span class="chat-name">{{ chat_title|default:"Чат" }}</span>
            <span id="status-indicator" class="chat-status status-offline">Не в сети</span>
        </div>
        <button onclick="parent.toggleChat()" class="btn btn-sm btn-close" aria-label="Close"></button> 
    </div>
    
    <div id="chat-log"></div>
    
    <div id="typing-indicator"></div>

    <div id="input-area">
        <input id="chat-message-input" type="text" class="form-control" placeholder="Сообщение..." autocomplete="off">
        <button id="chat-message-submit" class="btn btn-primary">➤</button>
    </div>

    {{ room_name|json_script:"room-name" }}
    {{ username|json_script:"user-name" }}

    <script>
        const roomName = JSON.parse(document.getElementById('room-name').textContent);
        const currentUsername = JSON.parse(document.getElementById('user-name').textContent);
        
        const chatLog = document.getElementById('chat-log');
        const statusIndicator = document.getElementById('status-indicator');
        const typingIndicator = document.getElementById('typing-indicator');

        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
        );

        function setOnline() {
            statusIndicator.textContent = 'В сети';
            statusIndicator.className = 'chat-status status-online';
        }
        function setOffline() {
            statusIndicator.textContent = 'Не в сети';
            statusIndicator.className = 'chat-status status-offline';
        }

        // Функция рендеринга сообщения (БЕЗ ИМЕНИ)
        function appendMessage(username, text, time, isMe) {
            const container = document.createElement('div');
            container.classList.add('message-container');
            container.classList.add(isMe ? 'sent' : 'received');
            
            // Мы убрали блок <div>${username}</div>, теперь только текст и время
            container.innerHTML = `
                <div class="message-bubble">
                    ${text}
                    <span class="msg-time">${time}</span>
                </div>
            `;
            chatLog.appendChild(container);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            if (data.type === 'history') {
                data.messages.forEach(msg => {
                    appendMessage(msg.username, msg.message, msg.timestamp, msg.username === currentUsername);
                });
            } 
            else if (data.type === 'chat_message') {
                if (data.username !== currentUsername) setOnline();
                appendMessage(data.username, data.message, data.timestamp, data.username === currentUsername);
            } 
            else if (data.type === 'user_status') {
                if (data.username !== currentUsername) {
                    if (data.status === 'online') setOnline();
                    else setOffline();
                }
            }
            else if (data.type === 'user_typing') {
                setOnline(); 
                if (data.is_typing) {
                    // Тут можно оставить имя, чтобы знать, КТО печатает, или заменить на "Собеседник печатает..."
                    typingIndicator.innerText = `печатает...`; 
                } else {
                    typingIndicator.innerText = '';
                }
            }
        };

        chatSocket.onclose = function(e) {
            setOffline();
            typingIndicator.innerText = 'Соединение потеряно';
        };

        const input = document.getElementById('chat-message-input');
        
        input.onkeyup = function(e) {
            if (e.keyCode === 13) document.getElementById('chat-message-submit').click();
        };
        
        document.getElementById('chat-message-submit').onclick = function(e) {
            const message = input.value;
            if (message.trim() === '') return;
            
            chatSocket.send(JSON.stringify({
                'type': 'chat_message',
                'message': message,
            }));
            input.value = '';
        };

        let typingTimer;
        input.addEventListener('input', () => {
            chatSocket.send(JSON.stringify({ 'type': 'typing', 'is_typing': true }));
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                 chatSocket.send(JSON.stringify({ 'type': 'typing', 'is_typing': false }));
            }, 1000);
        });
    </script>
</body>
</html>
